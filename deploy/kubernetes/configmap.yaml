apiVersion: v1
kind: ConfigMap
metadata:
  name: ddos-config
  namespace: ddos-detection
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-0.kafka:9092,kafka-1.kafka:9093,kafka-2.kafka:9094"
  SPARK_MASTER: "spark://spark-master:7077"
  METRICS_ENABLED: "true"
