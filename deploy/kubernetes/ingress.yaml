apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ddos-ingress
  namespace: ddos-detection
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "ddos-api"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ddos.example.com
      secretName: ddos-tls
  rules:
    - host: ddos.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ddos-api
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ddos-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ddos-dashboard
                port:
                  number: 8080
