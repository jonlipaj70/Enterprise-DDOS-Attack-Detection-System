apiVersion: apps/v1
# Reference only: Release 1 live sensors are supported as single Windows hosts, not Kubernetes replicas.
kind: Deployment
metadata:
  name: ddos-api
  namespace: ddos-detection
  labels:
    app: ddos-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ddos-api
  template:
    metadata:
      labels:
        app: ddos-api
    spec:
      containers:
        - name: api
          image: ddos-detection/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ddos-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health/live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
