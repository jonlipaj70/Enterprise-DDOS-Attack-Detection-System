apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddos-dashboard
  namespace: ddos-detection
  labels:
    app: ddos-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ddos-dashboard
  template:
    metadata:
      labels:
        app: ddos-dashboard
    spec:
      containers:
        - name: dashboard
          image: ddos-detection/dashboard:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
